[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ca-accounting-agent"
version = "1.0.0"
description = "AI-powered RL environment for financial accounting tasks."
readme = "README.md"
requires-python = ">=3.11"
authors = [
    {name = "Madhvi Rathor"}
]
dependencies = [
    "fastapi",
    "uvicorn",
    "python-dotenv",
    "pydantic",
    "openai",
    "openenv-core"
]

[tool.setuptools]
packages = ["tasks"]